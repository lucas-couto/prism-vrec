# Recommender model configuration.
#
# `recommenders_enabled` controls which recommenders run in this
# experiment. An empty or absent list = no recommender runs. To disable
# a model just remove it from this list. Valid names: bpr, vbpr, vnpr,
# deepstyle, avbpr, acf.
recommenders_enabled:
  - bpr
  - vbpr
  - vnpr
  - deepstyle
  - avbpr

common:
  latent_dim: [64, 128]
  learning_rate: [0.001, 0.01]
  l2_reg: [0.0001, 0.001]
  visual_dim: [64, 128]  # D (visual projection dimension)
  epochs: 100
  batch_size: 4096
  early_stopping_patience: 20
  early_stopping_metric: "ndcg@10"

  # Evaluation frequency during training (epochs between validations).
  # Full-ranking over the entire validation set is always used; only the
  # frequency changed relative to earlier runs (was 5, now 10) to reduce
  # training cost while preserving the same hyperparameter-selection
  # metric across all models.
  eval_every_epochs: 10

  # Optional subset-size for validation-set evaluation. Kept null so that
  # hyperparameter selection is performed on the full validation set,
  # consistent with the protocol used for bpr and vbpr. Set to an integer
  # only when explicitly accepting faster-but-approximate grid search.
  eval_sample_size: null

vnpr:
  hidden_layers: [[256, 128], [512, 256, 128]]

deepstyle:
  style_dim: [64, 128]

avbpr:
  att_hidden: [64, 128]

acf:
  att_hidden: [64, 128]
  max_history: [50]   # H: max items per user profile (item-level attention)
  # Optuna hp_space mirrors the grid lists exactly so both strategies
  # explore the same space (keeps grid/optuna comparable and the
  # hp_space <-> optuna.db distributions consistent).
  hp_space:
    latent_dim:    { type: categorical, choices: [64, 128] }
    learning_rate: { type: categorical, choices: [0.001, 0.01] }
    l2_reg:        { type: categorical, choices: [0.0001, 0.001] }
    visual_dim:    { type: categorical, choices: [64, 128] }
    att_hidden:    { type: categorical, choices: [64, 128] }
    max_history:   { type: categorical, choices: [50] }

# =============================================================================
# Hyperparameter-search strategy
# =============================================================================
# When ``strategy: grid`` (default), the framework runs the full Cartesian
# product of every list above (legacy behaviour).
#
# When ``strategy: optuna``, the framework runs Bayesian search via Optuna,
# sequential within each (dataset, model, embedding) cell.  Median pruning
# kills bad trials early — typically 40-60% wall-clock saved per study.
#
# Per-recommender ``hp_space`` blocks (commented examples below) declare
# continuous / log-uniform / categorical search ranges.  Without ``hp_space``,
# Optuna falls back to sampling from the discrete lists above as if it
# were a fancy random search.
hp_search:
  strategy: "grid"   # "grid" or "optuna"

  optuna:
    n_trials: 30
    sampler: "tpe"           # tpe | random | cmaes
    pruner: "median"         # median | hyperband | none
    n_startup_trials: 5
    warm_start: true
    timeout_seconds: null
    storage: null            # set to e.g. "sqlite:///optuna.db" to persist
                              # studies across pod restarts

# --- Optional: declare continuous / log-uniform search spaces ---------------
# Uncomment and adjust under each recommender to use Optuna's smart sampling
# instead of falling back to the discrete lists above.
#
# vbpr:
#   hp_space:
#     latent_dim:    { type: int,         low: 8,    high: 256, log: true }
#     learning_rate: { type: float,       low: 1e-5, high: 1e-1, log: true }
#     l2_reg:        { type: float,       low: 1e-7, high: 1e-2, log: true }
#     visual_dim:    { type: categorical, choices: [64, 128, 256] }
