# Smoke profile — one non-visual baseline (bpr) + one visual recommender
# (vbpr) with minimal hyperparameter ranges and a 1-trial Optuna search.
recommenders_enabled:
  - bpr
  - vbpr

embedding_dims: ["D64"]

common:
  latent_dim: [32]
  learning_rate: [0.01]
  l2_reg: [0.0001]
  visual_dim: [32]
  epochs: 2
  batch_size: 64
  early_stopping_patience: 2
  early_stopping_metric: "ndcg@10"
  eval_every_epochs: 1
  eval_sample_size: null

vnpr:
  hidden_layers: [[32]]

deepstyle:
  style_dim: [32]

avbpr:
  att_hidden: [32]

hp_search:
  strategy: "optuna"
  optuna:
    n_trials: 1
    sampler: "tpe"
    pruner: "none"
    n_startup_trials: 1
    warm_start: false
    timeout_seconds: null
    storage: null
