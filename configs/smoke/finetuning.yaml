# Smoke profile — finetuning is skipped entirely (condition=frozen in
# default.yaml drops the step).  These knobs are kept so the schema
# stays valid if someone flips condition to "finetuned" for debugging.
finetuning:
  epochs_max: 2
  learning_rate: 0.0001
  weight_decay: 0.0001
  batch_size: 16
  patience: 1
  extractors:
    - "resnet50"
