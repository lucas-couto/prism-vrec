# Fusion strategy configuration.
#
# `fusion_strategies_enabled` controls which strategies run in this
# experiment. An empty or absent list = no fusion runs. To disable a
# strategy just remove it from this list (its definition under
# `strategies:` stays as a catalogue). Valid names: mean, sum, prod,
# max_pool, weighted_mean, attention_weighted, gated, concat, pca,
# pca_per_model, adaptive_gated.
fusion_strategies_enabled:
  - mean
  - sum
  - prod
  - max_pool
  - weighted_mean
  - attention_weighted
  - gated
  - concat
  - pca
  - pca_per_model
  - adaptive_gated

# L2-normalise before fusion
normalize_before_fusion: true

strategies:
  # Strategies that require equal dims
  mean: {}
  sum: {}
  prod: {}
  max_pool: {}

  # Single-variant protocol (decided 2026-05-15): one canonical value
  # per parameterised strategy. These match the prior expand_grid
  # defaults, so embeddings stay bit-identical to earlier runs.
  weighted_mean:
    w_cnn: [0.5]  # w_vit = 1 - w_cnn

  attention_weighted: {}

  gated: {}

  # Strategies that accept differing dims
  concat: {}

  pca:
    n_components: [128]

  pca_per_model:
    n_components_per_model: [64]

  # Online (learned) fusion: per-item per-dim gate from a small MLP,
  # trained jointly with the recommender.  No offline .npy is produced;
  # the fuse step writes a JSON sidecar listing the component
  # embeddings (resnet50 + vit_b16 by default), and the recommender
  # instantiates the gate module at construction time.  See
  # docs/learned_fusion.md.
  adaptive_gated: {}
