# Configuração dos extratores visuais
#
# `extractors_enabled` controla quais extratores rodam neste experimento.
# Lista vazia ou ausente = nenhum extrator roda. Para desativar um modelo
# basta removê-lo desta lista (a definição em `extractors:` continua como
# catálogo). Nomes válidos: resnet50, vit_b16, cvt_13, coatnet_0,
# levit_256, clip_vitb32, dinov2_vitb14, convnext_base.
extractors_enabled:
  - resnet50
  - vit_b16
  - cvt_13
  - coatnet_0
  - levit_256
  - clip_vitb32
  - dinov2_vitb14
  - convnext_base

extractors:
  # --- Primários (usados na fusão) ---
  resnet50:
    model_name: "resnet50"
    weights: "IMAGENET1K_V2"
    raw_dim: 2048
    role: primary

  vit_b16:
    model_name: "vit_base_patch16_224"
    raw_dim: 768
    role: primary

  # --- Híbridos arquiteturais ---
  cvt_13:
    model_name: "cvt_13"
    raw_dim: 384
    role: hybrid

  coatnet_0:
    model_name: "coatnet_0_rw_224"
    raw_dim: 768
    role: hybrid

  levit_256:
    model_name: "levit_256"
    raw_dim: 384
    role: hybrid

  # --- Fundacionais SOTA ---
  clip_vitb32:
    model_name: "ViT-B-32"
    pretrained: "laion2b_s34b_b79k"
    raw_dim: 512
    role: foundation

  dinov2_vitb14:
    model_name: "dinov2_vitb14"
    raw_dim: 768
    role: foundation

  # --- Pure CNN moderna (baseline) ---
  convnext_base:
    model_name: "convnext_base.fb_in22k_ft_in1k"
    raw_dim: 1024
    role: pure_modern

# Extratores primários usados na fusão (os demais são baselines individuais)
fusion_extractors:
  - "resnet50"
  - "vit_b16"

# Dimensões de projeção a testar
projection_dims: [64, 128, 256]

# Batch size para extração (FP16 permite batch maior)
batch_size: 256

# Checkpoint a cada N batches
checkpoint_every: 500
