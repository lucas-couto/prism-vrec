# Visual extractor configuration.
#
# `extractors_enabled` controls which extractors run in this experiment.
# An empty or absent list = no extractor runs. To disable a model just
# remove it from this list (its definition under `extractors:` stays as
# a catalogue). Valid names: resnet50, vit_b16, cvt_13, coatnet_0,
# levit_256, clip_vitb32, dinov2_vitb14, convnext_base.
extractors_enabled:
  - resnet50
  - vit_b16
  - cvt_13
  - coatnet_0
  - levit_256
  - clip_vitb32
  - dinov2_vitb14
  - convnext_base

extractors:
  # --- Primary (used in fusion) ---
  resnet50:
    model_name: "resnet50"
    weights: "IMAGENET1K_V2"
    raw_dim: 2048
    role: primary

  vit_b16:
    model_name: "vit_base_patch16_224"
    raw_dim: 768
    role: primary

  # --- Architectural hybrids ---
  cvt_13:
    model_name: "cvt_13"
    raw_dim: 384
    role: hybrid

  coatnet_0:
    model_name: "coatnet_0_rw_224"
    raw_dim: 768
    role: hybrid

  levit_256:
    model_name: "levit_256"
    raw_dim: 384
    role: hybrid

  # --- SOTA foundation models ---
  clip_vitb32:
    model_name: "ViT-B-32"
    pretrained: "laion2b_s34b_b79k"
    raw_dim: 512
    role: foundation

  dinov2_vitb14:
    model_name: "dinov2_vitb14"
    raw_dim: 768
    role: foundation

  # --- Modern pure CNN (baseline) ---
  convnext_base:
    model_name: "convnext_base.fb_in22k_ft_in1k"
    raw_dim: 1024
    role: pure_modern

# Primary extractors used in fusion (the rest are standalone baselines)
fusion_extractors:
  - "resnet50"
  - "vit_b16"

# Projection dimensions to test
projection_dims: [64, 128, 256]

# Batch size for extraction (FP16 allows a larger batch)
batch_size: 256

# Checkpoint every N batches
checkpoint_every: 500
